{% extends "base.html" %}
{% block title %}Delete Task{% endblock %}
{% block content %}
    <h1>Delete Task</h1>
    <p>Are you sure you want to delete "<strong>{{ object.title }}</strong>"? This can't be undone.</p>
    <form method="post" class="card-form">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'task-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
