{% extends "base.html" %}
{% block title %}{% if object %}Edit Task{% else %}New Task{% endif %}{% endblock %}
{% block content %}
    <h1>{% if object %}Edit Task{% else %}New Task{% endif %}</h1>
    <form method="post" class="card-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'task-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
